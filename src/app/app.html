<div class="min-h-screen xl:h-screen xl:overflow-hidden bg-slate-950 text-slate-100 flex flex-col font-sans select-none print:bg-white print:text-black print:min-h-0 print:block print:overflow-visible">
  
  <!-- Encabezado (Ocultar al imprimir) -->
  <header class="bg-slate-900/60 backdrop-blur-md border-b border-slate-800/80 px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 shrink-0 sticky top-0 z-40 print:hidden">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black shadow-lg shadow-indigo-500/20">
        SW
      </div>
      <div>
        <h1 class="text-lg font-bold text-slate-100 tracking-tight">Secretaría Workstation</h1>
        <p class="text-xs text-slate-400">Plataforma de la Secretaría Municipal</p>
      </div>
    </div>

    <!-- Navegación de Features -->
    <nav class="flex items-center gap-2">
      <a 
        routerLink="/acuerdos"
        routerLinkActive="bg-indigo-600/30 border-indigo-500 text-indigo-300 font-semibold"
        [routerLinkActiveOptions]="{exact: true}"
        class="px-4 py-2 bg-slate-950/40 hover:bg-slate-800 text-slate-400 hover:text-white border border-slate-800 hover:border-slate-700 rounded-xl text-xs font-medium transition-all cursor-pointer flex items-center gap-1.5"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.0" stroke="currentColor" class="w-3.5 h-3.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        Acuerdos de Pago
      </a>
      <a 
        routerLink="/inspecciones"
        routerLinkActive="bg-indigo-600/30 border-indigo-500 text-indigo-300 font-semibold"
        class="px-4 py-2 bg-slate-950/40 hover:bg-slate-800 text-slate-400 hover:text-white border border-slate-800 hover:border-slate-700 rounded-xl text-xs font-medium transition-all cursor-pointer flex items-center gap-1.5"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.0" stroke="currentColor" class="w-3.5 h-3.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.421 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
        Inspecciones Oculares
      </a>
    </nav>
  </header>

  <!-- Contenedor Principal (Hereda scroll o se comporta como flexbox según la página cargada) -->
  <main class="flex-1 min-h-0 relative flex flex-col items-stretch justify-start overflow-hidden print:overflow-visible print:block">
    <router-outlet></router-outlet>
  </main>
</div>
